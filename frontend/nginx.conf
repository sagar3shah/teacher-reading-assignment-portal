server {
  listen 5173;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: serve index.html for client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend API + auth endpoints
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Keep SPA routing for browser navigation to /login and /logout,
  # but proxy the non-GET requests used by fetch() to Spring Security.
  location = /login {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    try_files /index.html =404;

    limit_except GET HEAD {
      proxy_pass http://backend:8080;
    }
  }

  location = /logout {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    try_files /index.html =404;

    limit_except GET HEAD {
      proxy_pass http://backend:8080;
    }
  }

  # Optional: H2 console via the same origin
  location /h2-console {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
