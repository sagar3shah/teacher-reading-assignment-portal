spring.application.name=backend
server.port=${PORT:8080}

# When deploying frontend + backend on different domains (e.g. Render), browsers require
# cross-site cookies to be `SameSite=None; Secure`. Keep local/dev defaults friendly.
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAMESITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# Respect X-Forwarded-* headers when behind a reverse proxy (Render).
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:framework}

# Comma-separated list of allowed origins for browser requests (for deployed frontend).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Database (local dev): file-based H2 for persistence without Docker.
# Stores files under: backend/data/
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/teacher_portal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE;AUTO_SERVER_PORT=9092}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Seed demo data from src/main/resources/data.sql (runs after Hibernate creates/updates tables)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 console (visual DB viewer)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
