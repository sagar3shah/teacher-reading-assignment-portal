services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  backend-data: